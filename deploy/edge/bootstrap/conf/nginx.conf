worker_processes auto;
error_log stderr warn;
pid logs/nginx.pid;

events {
  worker_connections 4096;
}

http {
  include /usr/local/openresty/nginx/conf/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  client_body_temp_path /tmp/openresty-client-body;
  proxy_temp_path /tmp/openresty-proxy;
  proxy_cache_path cache
    levels=1:2
    keys_zone=edge_cache:64m
    max_size=10g
    inactive=60m
    use_temp_path=off;

  include conf/trusted-proxies.conf;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  modsecurity on;
  modsecurity_rules_file /etc/openresty/modsecurity/main.conf;

  server {
    listen 8080 default_server;
    server_name _;

    location = /healthz {
      access_log off;
      default_type text/plain;
      return 200 "ok\n";
    }

    location / {
      return 503;
    }
  }

  include conf/sites/*.conf;
}

stream {
  limit_conn_zone $binary_remote_addr zone=l4_per_ip:16m;
  include conf/stream/services/*.conf;
}
