worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/openresty.pid;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  lua_package_path '/usr/local/openresty/lib/lua/?.lua;/usr/local/openresty/lib/lua/?/init.lua;;';
  include /usr/local/openresty/nginx/conf/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  log_format edge_json escape=json
    '{"timestamp":"$time_iso8601","request_id":"$edge_request_id",'
    '"remote_addr":"$remote_addr","host":"$host","method":"$request_method",'
    '"uri":"$uri","status":$status,"bytes":$body_bytes_sent,'
    '"request_time":$request_time,"upstream_time":"$upstream_response_time",'
    '"cache_status":"$upstream_cache_status","user_agent":"$http_user_agent"}';
  access_log /var/log/openresty/access.json edge_json;

  map $http_x_request_id $edge_request_id {
    default $request_id;
    "~^[A-Za-z0-9._-]{1,128}$" $http_x_request_id;
  }

  include /etc/openresty/trusted-proxies.conf;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_body_temp_path /tmp/openresty-client-body;
  proxy_temp_path /tmp/openresty-proxy;
  fastcgi_temp_path /tmp/openresty-fastcgi;
  uwsgi_temp_path /tmp/openresty-uwsgi;
  scgi_temp_path /tmp/openresty-scgi;
  client_max_body_size 20m;
  client_body_timeout 15s;
  client_header_timeout 15s;
  proxy_connect_timeout 5s;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;

  proxy_cache_path /var/cache/openresty
    levels=1:2
    keys_zone=edge_cache:64m
    max_size=10g
    inactive=60m
    use_temp_path=off;

  modsecurity on;
  modsecurity_rules_file /etc/openresty/modsecurity/main.conf;

  include /etc/openresty/conf.d/*.conf;
}

stream {
  limit_conn_zone $binary_remote_addr zone=l4_per_ip:16m;
  include /etc/openresty/stream.d/*.conf;
}
