SecRule REQUEST_HEADERS_NAMES "@rx [\r\n]" \
  "id:1100001,phase:1,deny,status:400,log,msg:'Invalid request header name'"

SecRule REQUEST_URI "@validateUrlEncoding" \
  "id:1100002,phase:1,deny,status:400,log,msg:'Invalid URL encoding'"

SecRule REQUEST_HEADERS:Content-Length "!@rx ^[0-9]{1,12}$" \
  "id:1100003,phase:1,deny,status:400,log,msg:'Invalid Content-Length',chain"
  SecRule &REQUEST_HEADERS:Content-Length "@gt 0"
