name: Edge Runtime Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'deploy/edge/**'
      - 'services/edge-agent/**'
      - '.github/workflows/edge-runtime-image.yml'
  workflow_dispatch:

concurrency:
  group: edge-runtime-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Normalize owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/onecdn-edge-kc-runtime
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/edge/openresty/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Write digest summary
        env:
          IMAGE: ghcr.io/${{ steps.owner.outputs.value }}/onecdn-edge-kc-runtime
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "$DIGEST"
          {
            echo '## Edge runtime image'
            echo
            echo "- Image: \`$IMAGE@$DIGEST\`"
            echo '- Platform: `linux/amd64`'
          } >> "$GITHUB_STEP_SUMMARY"
