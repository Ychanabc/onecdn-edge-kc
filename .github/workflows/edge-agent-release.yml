name: Edge Agent Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'services/edge-agent/**'
      - '.github/workflows/edge-agent-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  binaries:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/edge-agent/go.mod
          cache-dependency-path: services/edge-agent/go.mod
      - name: Build binary and checksum
        working-directory: services/edge-agent
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
        run: |
          mkdir -p dist
          binary="onecdn-edge-kc-agent-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${binary}" ./cmd/edge-agent
          (cd dist && sha256sum "${binary}" > "${binary}.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: onecdn-edge-kc-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: services/edge-agent/dist/onecdn-edge-kc-agent-*
          if-no-files-found: error
      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: services/edge-agent/dist/onecdn-edge-kc-agent-*
          fail_on_unmatched_files: true

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Normalize owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/onecdn-edge-kc-agent
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/edge-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Write digest summary
        env:
          IMAGE: ghcr.io/${{ steps.owner.outputs.value }}/onecdn-edge-kc-agent
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "$DIGEST"
          {
            echo '## Edge agent image'
            echo
            echo "- Image: \`$IMAGE@$DIGEST\`"
            echo '- Platforms: `linux/amd64`, `linux/arm64`'
          } >> "$GITHUB_STEP_SUMMARY"
